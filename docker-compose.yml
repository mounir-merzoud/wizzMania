services:
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: securecloud-auth
    restart: unless-stopped
    env_file: .env
    environment:
      FILE_SERVICE_ADDRESS: file_service:50052
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_CONN: ${DATABASE_URL}
    ports:
      - "50051:50051"

  messaging_service:
    build: ./services/messaging_service
    container_name: securecloud-messaging
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "7002:7002"
    depends_on:
      - auth_service

  file_service:
    build: ./services/file_service
    container_name: securecloud-file
    restart: unless-stopped
    env_file: .env
    environment:
      FILE_SERVICE_STORAGE: /data/files
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./files_storage:/data/files
    ports:
      - "50052:50052"

