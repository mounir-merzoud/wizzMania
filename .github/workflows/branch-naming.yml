name: Branch Naming Convention

on:
  pull_request:
    branches:
      - main

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch name
        shell: bash
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          echo "🔍 Checking branch name: ${BRANCH_NAME}"

          if [[ ! "${BRANCH_NAME}" =~ ^(feature|bugfix)\/[A-Z]{2}_[0-9]{2}-[0-9]{2}-[0-9]{4}_.+ ]]; then
            echo "❌ Branch name '${BRANCH_NAME}' does not follow convention"
            echo "✅ Expected formats:"
            echo "   feature/AA_dd-mm-yyyy_description"
            echo "   bugfix/AA_dd-mm-yyyy_description"
            exit 1
          fi

          echo "✅ Branch name valid"

